<!DOCTYPE html>
<html>
<head>
    <title>Firebase Cleaner</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; padding: 24px; max-width: 520px; background: #f5f5f5; }
        h2 { margin: 0 0 16px; font-size: 16px; color: #333; }
        .card { background: #fff; border-radius: 10px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 14px; }
        label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
        select { width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; background: #fff; cursor: pointer; }
        .btn-row { display: flex; gap: 8px; margin-top: 14px; }
        button { flex: 1; padding: 9px 0; border: none; border-radius: 7px; font-size: 13px; cursor: pointer; font-weight: 600; transition: opacity .15s; }
        button:hover { opacity: .85; }
        .btn-danger  { background: #ff4d4d; color: #fff; }
        .btn-warn    { background: #ff9900; color: #fff; }
        .btn-safe    { background: #2196f3; color: #fff; }
        #status { margin-top: 14px; font-size: 13px; min-height: 22px; padding: 8px 12px; border-radius: 6px; background: #f0f0f0; color: #444; white-space: pre-wrap; }
        #status.ok  { background: #e6f4ea; color: #1e7e34; }
        #status.err { background: #fde8e8; color: #c0392b; }
        #status.run { background: #fff8e1; color: #7a5800; }
        .db-badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px; background: #e3f0ff; color: #1a5fb4; margin-left: 6px; vertical-align: middle; }
    </style>
</head>
<body>

<div class="card">
    <h2>🔥 Firebase Cleaner</h2>
    <label>База данных:</label>
    <select id="db-select" onchange="switchDb(this.value)">
        <option value="primary">Primary — cheeseboard-c7f66 (test account)</option>
        <option value="backup">Backup — cheeseboard-7b01d (my account)</option>
    </select>
</div>

<div class="card">
    <label>Действия <span id="db-label" class="db-badge">primary</span></label>
    <div class="btn-row">
        <button class="btn-safe" onclick="listRooms()">📋 Показать комнаты</button>
        <button class="btn-warn" onclick="cleanEmptyRooms()">🧹 Удалить пустые</button>
    </div>
    <div class="btn-row">
        <button class="btn-danger" onclick="cleanAllRooms()">💣 Удалить ВСЕ комнаты</button>
    </div>
</div>

<div id="status">Выберите базу и действие.</div>

<script>
    const CONFIGS = {
        primary: {
            label: "primary (cheeseboard-c7f66)",
            apiKey:      "AIzaSyAeDjmTl5-xAHOmvkCgG-QzKhHaFuehpjY",
            databaseURL: "https://cheeseboard-c7f66-default-rtdb.firebaseio.com"
        },
        backup: {
            label: "backup (cheeseboard-7b01d)",
            apiKey:      "AIzaSyAnc8GOrjSl3kkOHBuCTRt3SF31DnypzBo",
            databaseURL: "https://cheeseboard-7b01d-default-rtdb.firebaseio.com"
        }
    };

    let db = null;
    let activeKey = 'primary';
    // Cache one Firebase app per config key — never delete, just reuse
    const _appCache = {};

    function getDbForKey(key) {
        if (!_appCache[key]) {
            const cfg = CONFIGS[key];
            const appName = 'cleaner-' + key;
            let app;
            try { app = firebase.app(appName); }
            catch(e) { app = firebase.initializeApp({ apiKey: cfg.apiKey, databaseURL: cfg.databaseURL }, appName); }
            _appCache[key] = app.database();
        }
        return _appCache[key];
    }

    function switchDb(key) {
        activeKey = key;
        document.getElementById('db-label').textContent = key;
        db = getDbForKey(key);
        setStatus('Переключено на ' + CONFIGS[key].label + '. Выберите действие.', '');
    }

    function setStatus(msg, cls) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = cls || '';
    }

    async function listRooms() {
        if (!db) { setStatus('⚠️ Сначала база инициализируется...', 'run'); switchDb(activeKey); }
        setStatus('Загружаем список комнат...', 'run');
        try {
            const snap = await db.ref('cheeseboard').once('value');
            const rooms = snap.val();
            if (!rooms) { setStatus('Нет комнат.', 'ok'); return; }
            const ids = Object.keys(rooms);
            let lines = `Найдено комнат: ${ids.length}\n`;
            for (const id of ids) {
                const r = rooms[id];
                const msgCount = r.messages ? Object.keys(r.messages).length : 0;
                const users    = r.users    ? Object.keys(r.users).length    : 0;
                lines += `  • ${id}  [сообщений: ${msgCount}, юзеров: ${users}]\n`;
            }
            setStatus(lines.trim(), 'ok');
        } catch(e) {
            setStatus('❌ Ошибка: ' + e.message, 'err');
        }
    }

    async function cleanEmptyRooms() {
        if (!db) switchDb(activeKey);
        setStatus('Проверяем комнаты...', 'run');
        try {
            const snap = await db.ref('cheeseboard').once('value');
            const rooms = snap.val();
            if (!rooms) { setStatus('Нет комнат для очистки.', 'ok'); return; }

            let deleted = 0;
            for (const id in rooms) {
                const r = rooms[id];
                const users = r.users ? Object.keys(r.users) : [];
                // Empty: no users node, or all users are offline
                const hasOnline = users.some(uid => r.users[uid] && r.users[uid].online === true);
                if (!hasOnline) {
                    await db.ref('cheeseboard/' + id).remove();
                    deleted++;
                }
            }
            setStatus(`✅ Удалено пустых комнат: ${deleted} (из ${Object.keys(rooms).length})`, 'ok');
        } catch(e) {
            setStatus('❌ Ошибка: ' + e.message, 'err');
        }
    }

    async function cleanAllRooms() {
        if (!confirm('УДАЛИТЬ ВСЕ КОМНАТЫ в ' + CONFIGS[activeKey].label + '?\nЭто необратимо!')) return;
        if (!db) switchDb(activeKey);
        setStatus('Удаляем все комнаты...', 'run');
        try {
            await db.ref('cheeseboard').remove();
            setStatus('✅ Все комнаты удалены в ' + CONFIGS[activeKey].label, 'ok');
        } catch(e) {
            setStatus('❌ Ошибка: ' + e.message, 'err');
        }
    }

    // Init default on load
    window.onload = () => {
        switchDb('primary');
        const params = new URLSearchParams(window.location.search);
        if (params.get('auto') === '1') cleanEmptyRooms();
        // ?db=backup to pre-select backup
        const dbParam = params.get('db');
        if (dbParam && CONFIGS[dbParam]) {
            document.getElementById('db-select').value = dbParam;
            switchDb(dbParam);
        }
    };
</script>
</body>
</html>
